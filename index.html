<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泰坦巨神</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: black;
            color: white;
            overflow: hidden;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #game-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #game-container canvas {
            width: 100% !important;
            height: 100% !important;
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }

        /* 載入畫面 */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Logo 樣式 */
        .loading-logo {
            max-width: 300px;
            max-height: 150px;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 進度條容器 */
        .progress-bar-container {
            position: relative;
            width: 360px;
            height: 20px;
            margin: 20px 0;
        }

        /* 進度條共用樣式 */
        .progress-bar-bg,
        .progress-bar-fill,
        .progress-bar-effect {
            position: absolute;
            inset: 0;
            background-repeat: no-repeat;
            background-size: contain;
        }

        /* 進度條背景框 */
        .progress-bar-bg {
            background-image: url('src/assets/background.png');
            z-index: 0;
        }

        /* 進度條填充 */
        .progress-bar-fill {
            background-image: url('src/assets/bar.png');
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 0.3s ease-out;
            animation: progressPulse 1.5s ease-in-out infinite;
            z-index: 1;
        }

        /* 進度條效果層 */
        .progress-bar-effect {
            background-image: url('src/assets/effect.png');
            transform-origin: left center;
            transform: scaleX(0);
            transition: transform 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0.8;
            mix-blend-mode: screen;
            animation: progressShine 1.5s ease-in-out infinite;
            z-index: 2;
        }

        /* 進度條動畫 */
        @keyframes progressPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        @keyframes progressShine {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }


        /* 載入文字 */
        .loading-percentage,
        .loading-message {
            color: #ffffff;
        }

        .loading-percentage {
            font-size: 24px;
            font-weight: bold;
            margin-top: 30px;
            min-height: 30px;
        }

        .loading-message {
            font-size: 18px;
            opacity: 0.7;
            margin-top: 15px;
            min-height: 25px;
        }

        /* 控制面板 */
        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-button {
            padding: 10px 20px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .control-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }

        /* 錯誤訊息 */
        #error-message {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            display: none;
            max-width: 80%;
            text-align: center;
            z-index: 1001;
        }

        /* 彈窗 iframe 容器 */
        #popup-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            contain: layout style paint;
        }

        #popup-wrapper.show {
            width: 100%;
            height: 100%;
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* iframe */
        #popup {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 關閉按鈕 */
        #popup-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2001;
            transition: all 0.3s ease;
            padding: 0;
            line-height: 1;
        }

        #popup-close-btn:hover {
            background: rgba(255, 0, 0, 0.8);
            transform: scale(1.1);
        }

        #popup-close-btn:active {
            transform: scale(0.95);
        }

        /* 打開按鈕 */
        #popup-open-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #popup-open-btn.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- 遊戲畫布容器 -->
        <div id="game-container"></div>
        
        <!-- 彈窗 iframe -->
        <div id="popup-wrapper">
            <iframe id="popup" name="popup" scrolling="auto" frameborder="0" title="Game Info"></iframe>
            <button id="popup-close-btn">×</button>
        </div>
        
        <!-- 載入畫面 -->
        <div id="loading-screen">
            <div class="loading-content">
                <img id="loading-logo" class="loading-logo" src="src/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
                
                <div class="progress-bar-container">
                    <div class="progress-bar-bg"></div>
                    <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    <div class="progress-bar-effect" id="progress-bar-effect"></div>
                </div>
            </div>
        </div>

    <script type="module" src="/games/titans/main.ts"></script>
    <script type="module">
        // 導入 Entry 類
        import { Entry } from '/src/core/Entry';
        
        // 將 Entry 暴露到全局
        window.Entry = Entry;
    </script>
    
    <script>
        // 打開 iframe 的函數
        function openPopup(url, gameInfo) {
            const popupWrapper = document.getElementById('popup-wrapper');
            const popup = document.getElementById('popup');
            const openBtn = document.getElementById('popup-open-btn');
            if (popupWrapper && popup) {
                // 移除所有可能隱藏 iframe 的 class
                popupWrapper.classList.remove('hide', 'hidden');
                popupWrapper.classList.add('show');
                
                // 強制設置樣式，確保顯示
                popupWrapper.style.position = 'fixed';
                popupWrapper.style.top = '0';
                popupWrapper.style.left = '0';
                popupWrapper.style.zIndex = '99999';
                popupWrapper.style.display = '';
                popupWrapper.style.visibility = '';
                popupWrapper.style.opacity = '';
                
                // 保存 gameDetail 到 Entry（如果提供了 gameInfo）
                if (gameInfo && window.Entry) {
                    window.Entry.setGameDetail(gameInfo);
                }
                
                popup.src = url || 'https://www.google.com';
                
                if (openBtn) {
                    openBtn.classList.add('hidden');
                }
                console.log('打開 iframe:', url || 'https://www.google.com');
                if (gameInfo) {
                    console.log('保存 gameDetail:', gameInfo);
                }
            }
        }

        // 將 openPopup 暴露到全局，供 TypeScript 代碼調用
        window.openPopup = openPopup;

        // 關閉 iframe 的函數
        function closePopup() {
            const popupWrapper = document.getElementById('popup-wrapper');
            const popup = document.getElementById('popup');
            const openBtn = document.getElementById('popup-open-btn');
            if (popupWrapper) {
                popupWrapper.classList.remove('show');
                if (openBtn) {
                    openBtn.classList.remove('hidden');
                }
                console.log('關閉 iframe');
            }
        }

        // 綁定按鈕事件
        document.addEventListener('DOMContentLoaded', function() {
            const closeBtn = document.getElementById('popup-close-btn');
            const openBtn = document.getElementById('popup-open-btn');
            
            if (closeBtn) {
                closeBtn.addEventListener('click', closePopup);
            }
            
            if (openBtn) {
                openBtn.addEventListener('click', function() {
                    openPopup('https://www.google.com', {
                        apiURL: '',
                        gameCode: 'test',
                        gameLanguage: 'en',
                        gameToken: 'test-token',
                        url: 'https://www.google.com'
                    });
                });
            }
        });

        // 修復 iPhone Chrome 100vh 問題：動態設置實際視窗高度
        (function() {
            function setHeight() {
                const height = window.visualViewport?.height || window.innerHeight;
                const width = window.innerWidth;
                document.documentElement.style.height = height + 'px';
                document.body.style.height = height + 'px';
                const app = document.getElementById('app-container');
                const loading = document.getElementById('loading-screen');
                if (app) {
                    app.style.height = height + 'px';
                    app.style.width = width + 'px';
                }
                if (loading) {
                    loading.style.height = height + 'px';
                    loading.style.width = width + 'px';
                }
            }
            
            setHeight();
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setHeight);
            }
            window.addEventListener('resize', setHeight);
            window.addEventListener('orientationchange', () => setTimeout(setHeight, 100));
        })();
    </script>
</body>
</html>
